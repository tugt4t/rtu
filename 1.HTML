            performMainSearch();
        }

        // 搜索历史
        let searchHistory = JSON.parse(localStorage.getItem('searchHistory') || '[]');
        const maxSearchHistory = 8;
        let activeSuggestionIndex = -1;
        let searchDebounceTimer = null;

        // 初始化搜索
        function initSearch() {
            const input = document.getElementById('searchInput');
            
            // 输入事件（防抖）
            input.addEventListener('input', function(e) {
                const value = e.target.value.trim();
                
                // 更新清除按钮显示
                const clearBtn = document.querySelector('.clear-button');
                clearBtn.style.display = value ? 'block' : 'none';
                
                clearTimeout(searchDebounceTimer);
                searchDebounceTimer = setTimeout(() => {
                    if (value) {
                        showSuggestions(value);
                        hideSearchHistory();
                    } else {
                        hideSuggestions();
                        showSearchHistory();
                    }
                }, 300);
            });
            
            // 聚焦事件
            input.addEventListener('focus', function(e) {
                const value = e.target.value.trim();
                if (!value) {
                    showSearchHistory();
                }
            });
            
            // 键盘事件
            input.addEventListener('keydown', function(e) {
                const suggestions = document.querySelectorAll('#suggestionsList li');
                
                switch(e.key) {
                    case 'ArrowDown':
                        e.preventDefault();
                        activeSuggestionIndex = Math.min(activeSuggestionIndex + 1, suggestions.length - 1);
                        updateActiveSuggestion(suggestions);
                        break;
                    case 'ArrowUp':
                        e.preventDefault();
                        activeSuggestionIndex = Math.max(activeSuggestionIndex - 1, -1);
                        updateActiveSuggestion(suggestions);
                        break;
                    case 'Enter':
                        e.preventDefault();
                        if (activeSuggestionIndex >= 0 && suggestions[activeSuggestionIndex]) {
                            const name = suggestions[activeSuggestionIndex].querySelector('.suggestion-text').textContent;
                            selectSuggestion(name);
                        } else {
                            searchSites();
                        }
                        break;
                    case 'Escape':
                        hideSuggestions();
                        hideSearchHistory();
                        input.blur();
                        break;
                }
            });
            
            // 点击外部关闭
            document.addEventListener('click', e => {
                if (!e.target.closest('.search-container')) {
                    hideSuggestions();
                    hideSearchHistory();
                }
            });
            
            // 渲染搜索历史
            renderSearchHistory();
        }

        // 更新活动建议
        function updateActiveSuggestion(suggestions) {
            suggestions.forEach((item, index) => {
                item.classList.toggle('active', index === activeSuggestionIndex);
            });
        }

        // 高亮匹配文本
        function highlightMatch(text, query) {
            if (!query) return text;
            const regex = new RegExp(`(${query})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        // 显示搜索建议
        function showSuggestions(query) {
            activeSuggestionIndex = -1;
            
            const suggestions = sites
                .filter(s => 
                    s.name.toLowerCase().includes(query.toLowerCase()) || 
                    s.desc.toLowerCase().includes(query.toLowerCase()) || 
                    s.location.toLowerCase().includes(query.toLowerCase()) ||
                    s.tags.some(tag => tag.toLowerCase().includes(query.toLowerCase()))
                )
                .slice(0, 6);
            
            const list = document.getElementById('suggestionsList');
            
            if (suggestions.length) {
                list.innerHTML = suggestions.map(s => `
                    <li onclick="selectSuggestion('${s.name}')">
                        <span class="suggestion-icon">📍</span>
                        <span class="suggestion-text">${highlightMatch(s.name, query)}</span>
                        <span class="suggestion-meta">${s.location}</span>
                    </li>
                `).join('');
                document.getElementById('searchSuggestions').classList.add('show');
            } else {
                list.innerHTML = `
                    <li class="search-no-result">
                        <div class="icon">🔍</div>
                        <div>未找到相关景点</div>
                        <div style="font-size:0.8rem;margin-top:0.3rem;">试试其他关键词</div>
                    </li>
                `;
                document.getElementById('searchSuggestions').classList.add('show');
            }
        }

        // 隐藏搜索建议
        function hideSuggestions() {
            document.getElementById('searchSuggestions').classList.remove('show');
            activeSuggestionIndex = -1;
        }

        // 显示搜索历史
        function showSearchHistory() {
            if (searchHistory.length === 0) return;
            
            const historyList = document.getElementById('searchHistoryList');
            historyList.innerHTML = searchHistory.map((item, index) => `
                <span class="search-history-item" onclick="selectHistoryItem('${item}')">
                    ${item}
                </span>
            `).join('');
            
            document.getElementById('searchHistory').classList.add('show');
        }

        // 隐藏搜索历史
        function hideSearchHistory() {
            document.getElementById('searchHistory').classList.remove('show');
        }

        // 渲染搜索历史
        function renderSearchHistory() {
            const historyList = document.getElementById('searchHistoryList');
            if (searchHistory.length === 0) {
                historyList.innerHTML = '<span style="color:#94a3b8;font-size:0.85rem;">暂无搜索历史</span>';
            } else {
                historyList.innerHTML = searchHistory.map(item => `
                    <span class="search-history-item" onclick="selectHistoryItem('${item}')">
                        ${item}
                    </span>
                `).join('');
            }
        }

        // 选择历史记录
        function selectHistoryItem(term) {
            document.getElementById('searchInput').value = term;
            hideSearchHistory();
            searchSites();
        }

        // 清除搜索历史
        function clearSearchHistory() {
            if (confirm('确定要清除所有搜索历史吗？')) {
                searchHistory = [];
                localStorage.removeItem('searchHistory');
                renderSearchHistory();
                hideSearchHistory();
            }
        }

        // 添加到搜索历史
        function addToSearchHistory(term) {
            // 移除已存在的相同项
            searchHistory = searchHistory.filter(item => item !== term);
            
            // 添加到开头
            searchHistory.unshift(term);
            
            // 限制数量
            searchHistory = searchHistory.slice(0, maxSearchHistory);
            
            // 保存到本地存储
            localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
            
            // 重新渲染
            renderSearchHistory();
        }

        // 选择建议
        function selectSuggestion(name) {
            document.getElementById('searchInput').value = name;
            hideSuggestions();
            searchSites();
        }

        // 搜索景点
        function searchSites() {
            const term = document.getElementById('searchInput').value.trim();
            hideSuggestions();
            hideSearchHistory();
            
            if (term) {
                const filtered = sites.filter(s => 
                    s.name.toLowerCase().includes(term.toLowerCase()) || 
                    s.desc.toLowerCase().includes(term.toLowerCase()) || 
                    s.location.toLowerCase().includes(term.toLowerCase()) ||
                    s.tags.some(tag => tag.toLowerCase().includes(term.toLowerCase()))
                );
                
                if (filtered.length === 0) {
                    document.getElementById('searchStats').innerHTML = `
                        <span style="color:#94a3b8;">未找到 "<strong>${term}"</strong> 的结果</span>
                        <span style="color:#667eea;margin-left:1rem;cursor:pointer;" onclick="clearSearch()">重置搜索</span>
                    `;
                    document.getElementById('sitesGrid').innerHTML = `
                        <div style="grid-column:1/-1;text-align:center;padding:4rem;">
                            <div style="font-size:5rem;margin-bottom:1.5rem;">🔍</div>

                            <p style="color:#64748b;margin-bottom:1.5rem;">试试其他关键词，或者查看热门搜索</p>
                            <button onclick="clearSearch()" style="padding:0.8rem 2rem;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:10px;cursor:pointer;font-size:1rem;transition:all 0.3s;">清除搜索</button>
                        </div>
                    `;
                    document.getElementById('pagination').innerHTML = '';
                } else {
                    document.getElementById('searchStats').innerHTML = `
                        <span>找到 <strong>${filtered.length}</strong> 个结果</span>
                        <span style="color:#94a3b8;margin-left:0.5rem;">关键词: "${term}"</span>
                        <span style="color:#667eea;margin-left:1rem;cursor:pointer;" onclick="clearSearch()">✕</span>
                    `;
                    
                    // 临时替换sites用于渲染
                    const originalSites = window.sites;
                    window.sites = filtered;
                    renderSites();
                    window.sites = originalSites;
                    
                    // 添加到搜索历史
                    addToSearchHistory(term);
                }
            } else {
                document.getElementById('searchStats').textContent = '';
                renderSites();
            }
        }

        // 筛选摄影
        function filterPhotos(category) {
            document.querySelectorAll('.photo-category').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');

            const container = document.getElementById('photoGrid');
            let filteredSites = photoSites;
            if (category !== 'all') {
                if (category === 'offbeat') {
                    // 小众分类：筛选ID >= 200 的图片
                    filteredSites = photoSites.filter(s => s.id >= 200);
                } else {
                    filteredSites = photoSites.filter(s => s.category === category);
                }
            }
            container.innerHTML = filteredSites.map(site => `
                <div class="photo-card" data-id="${site.id}" onclick="handlePhotoCardClick(event, ${site.id})">
                    <div class="photo-card-inner">
                        <div class="photo-card-panorama">

        // 初始化卡片滚动功能
        function initCardScroll() {
            const cards = document.querySelectorAll('.card');

            cards.forEach(card => {
                let isScrolling = false;
                let startY = 0;
                let scrollThreshold = 30;

                card.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const cardPanorama = card.querySelector('.card-panorama');
                    const isPanoramaDown = card.classList.contains('panorama-down');

                    if (e.deltaY > 0 && !isPanoramaDown) {
                        // 向下滚动，显示详情
                        card.classList.add('panorama-down');
                    } else if (e.deltaY < 0 && isPanoramaDown) {
                        // 向上滚动，返回图片
                        card.classList.remove('panorama-down');
                    }
                }, { passive: false });

                // 触摸滑动支持
                card.addEventListener('touchstart', (e) => {
                    isScrolling = true;
                    startY = e.touches[0].clientY;
                }, { passive: true });

                card.addEventListener('touchmove', (e) => {
                    if (!isScrolling) return;

                    const currentY = e.touches[0].clientY;
                    const diff = startY - currentY;

                    if (Math.abs(diff) > scrollThreshold) {
                        const cardPanorama = card.querySelector('.card-panorama');
                        const isPanoramaDown = card.classList.contains('panorama-down');

                        if (diff > 0 && !isPanoramaDown) {
                            // 向上滑动，显示详情
                            card.classList.add('panorama-down');
                            isScrolling = false;
                        } else if (diff < 0 && isPanoramaDown) {
                            // 向下滑动，返回图片
                            card.classList.remove('panorama-down');
                            isScrolling = false;
                        }
                    }
                }, { passive: true });

                card.addEventListener('touchend', () => {
                    isScrolling = false;
                }, { passive: true });
            });
        }

        // 发送 AI 消息
        async function sendAIMessage() {
            const input = document.getElementById('aiInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // 添加用户消息
            addUserMessage(message);
            input.value = '';
            
            // 显示加载状态
            const loadingId = addLoadingMessage();
            
            try {
                let response;
                if (aiConfig.provider === 'local') {
                    response = getLocalAIResponse(message);
                } else if (aiConfig.provider === 'openai') {
                    response = await callOpenAI(message);
                } else if (aiConfig.provider === 'anthropic') {
                    response = await callAnthropic(message);
                }
                
                // 移除加载消息
                removeLoadingMessage(loadingId);
                
                // 添加 AI 响应
                addAIMessage(response);
                
                // 保存历史
                saveChatHistory();
            } catch (error) {
                removeLoadingMessage(loadingId);
                addAIMessage('抱歉，我遇到了一些问题。请检查 API 设置后重试。');
                console.error('AI Error:', error);

        // 格式化 AI 响应
        function formatAIResponse(text) {
            // 转义 HTML
            text = escapeHtml(text);
            
            // 处理代码块
            text = text.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            
            // 处理行内代码
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // 处理换行
            text = text.replace(/\n/g, '<br>');
            
            return text;
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 调用 OpenAI API
        async function callOpenAI(message) {
            if (!aiConfig.apiKey) {
                throw new Error('未配置 API 密钥');
            }
            
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${aiConfig.apiKey}`
                },
                body: JSON.stringify({
                    model: aiConfig.model,
                    messages: [
                        {
                            role: 'system',
                            content: '你是一个专业的澳门旅游助手，熟悉澳门的景点、美食、文化、交通等信息。请用友好、专业的语气回答用户的问题。'
                        },
                        ...chatHistory.slice(-10),
                        { role: 'user', content: message }
                    ],
                    max_tokens: 1000,
                    temperature: 0.7
                })
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'API 调用失败');
            }
            
            const data = await response.json();
            return data.choices[0].message.content;
        }

            if (!aiConfig.apiKey) {

            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': aiConfig.apiKey,
                    'anthropic-version': '2023-06-01'
                },
                body: JSON.stringify({
                    model: aiConfig.model,
                    max_tokens: 1000,
                    messages: [
                        {
                            role: 'user',
                            content: `你是一个专业的澳门旅游助手，熟悉澳门的景点、美食、文化、交通等信息。请用友好、专业的语气回答用户的问题。\n\n用户问题：${message}`
                        }
                    ]
                })
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'API 调用失败');
            }
            
            const data = await response.json();
            return data.content[0].text;
        }

                            // 向下滑动，返回图片
                            card.classList.remove('panorama-down');
                            isScrolling = false;
                        }
                    }
                }, { passive: true });

                card.addEventListener('touchend', () => {
                    isScrolling = false;
                }, { passive: true });
            });
        }


    </script>
</body>
</html>
